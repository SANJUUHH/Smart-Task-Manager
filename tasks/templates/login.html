<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        *{
            font-size: 20px;
     
        }
        body{
            background-color: black;
            color: green;
        }

        h1{
            margin-top: 30px;
            font-size: 50px;
        }

        h3{
            margin-top: 50px;
            font-size: 30px;
        }

        input{
            background-color: black;
            border-color: green;
        }

        .btn{
            text-decoration: none;
            background-color: green;
            color: white;
            padding: 10px;
        }

        .btn:hover{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>

    {% include 'navbar.html' %}
    
    
    <form method="post">
        {% csrf_token %}
        <h1>Welcome to Smart Task Manager</h1>
        
        <h3>Login into Your Account</h3>

        <label>Username:
            <input type="text" name="username" placeholder="Enter your username">
        </label>
        <br><br>

        <label>Password:
            <input type="password" name="password" placeholder="Enter your Password">
        </label>
        <br><br>

        <p>Don't have an account ? <a class="btn" href="{% url 'register' %}">Register</a></p>

        <button type="submit" class="btn">Login</button>
        <br><br>
        
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    </form>
</body>
</html>
